<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДВОРФ.ДЕВ | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=JetBrains+Mono:wght@500;800&display=swap');

        body {
            background-color: #000;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            cursor: crosshair;
        }

        .hero-font { font-family: 'Unbounded', sans-serif; }

        /* Эффект сканирующих линий (как на старых мониках) */
        .scanline {
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Неоновая рамка */
        .neon-border {
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
        }

        .card-gray {
            background-color: #0a0a0a;
            border: 1px solid #1a1a1a;
        }

        /* Анимация мигающего курсора */
        .cursor-blink {
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .green-text { color: #00ff00; }
    </style>
</head>
<body class="pb-20">

    <section class="flex flex-col items-center pt-10 px-4">
        <div class="max-w-3xl w-full">
            <img src="volkswagen-bus.jpg" alt="Banner" class="w-full border border-zinc-800 shadow-2xl">
        </div>

        <div class="text-center mt-8">
            <h1 class="hero-font text-6xl md:text-8xl tracking-tighter uppercase leading-none">
                ДВОРФ.ДЕВ
            </h1>
            <p class="mt-4 text-[10px] md:text-xs tracking-[0.4em] uppercase text-zinc-500 font-bold">
                ПАТРІОТ <span class="green-text">//</span> РОЗРОБНИК Х*ЙНІ <span class="green-text">//</span> БАЙРАКТАР
            </p>
        </div>

        <button class="mt-10 bg-[#00ff00] text-black font-black px-8 py-3 text-xl uppercase tracking-tighter hover:bg-white transition-colors">
            SHOW 'EM РІАЛ СВЕГ
        </button>
    </section>

    <main class="max-w-5xl mx-auto mt-24 px-6">
        <div class="flex items-center gap-4 mb-12">
            <div class="h-[3px] w-10 bg-[#00ff00]"></div>
            <h2 class="hero-font text-3xl uppercase tracking-widest">ПРОЕКТИКИ</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-16">
            
            <div class="group">
                <div class="aspect-video neon-border relative flex items-center justify-center overflow-hidden">
                    <div class="scanline absolute inset-0"></div>
                    <span class="text-4xl green-text font-black group-hover:scale-125 transition-transform">>_</span>
                </div>
                <div class="mt-4">
                    <p class="text-[10px] green-text font-bold mb-1">APP / UNITY C#</p>
                    <h3 class="hero-font text-lg leading-tight uppercase">Навчіть тебе основам шарпу</h3>
                </div>
            </div>

            <div class="group">
                <div class="aspect-video card-gray relative flex items-center justify-center">
                    <span class="text-4xl text-zinc-800 font-black group-hover:text-zinc-500">>_</span>
                </div>
                <div class="mt-4">
                    <p class="text-[10px] green-text font-bold mb-1">GAME / 3D</p>
                    <h3 class="hero-font text-lg leading-tight uppercase">Фонова гра під тему "Strange Places"</h3>
                </div>
            </div>

            <div class="group">
                <div class="aspect-video card-gray relative flex items-center justify-center">
                    <span class="text-4xl text-zinc-800 font-black group-hover:text-zinc-500">>_</span>
                </div>
                <div class="mt-4">
                    <p class="text-[10px] green-text font-bold mb-1">WEB / REACT</p>
                    <h3 class="hero-font text-lg leading-tight uppercase">Ще одна всрата поробка</h3>
                </div>
            </div>

            <div class="group">
                <div class="aspect-video card-gray relative flex items-center justify-center">
                    <span class="text-4xl text-zinc-800 font-black group-hover:text-zinc-500">>_</span>
                </div>
                <div class="mt-4">
                    <p class="text-[10px] green-text font-bold mb-1">UI / UX</p>
                    <h3 class="hero-font text-lg leading-tight uppercase">Токсичний дашборд</h3>
                </div>
            </div>

        </div>
    </main>

    <footer class="mt-32 pb-10 text-center">
        <p class="text-zinc-800 text-[10px] tracking-[1em] uppercase">error_404_humanity_not_found</p>
    </footer>

</body>
</html>
